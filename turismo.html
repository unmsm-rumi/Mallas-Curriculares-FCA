<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Curricular - Turismo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --crema:       #edf7ef;
            --verde-claro: #b7d9b8;
            --verde-medio: #5c9c6f;
            --verde-oscuro: #477c57;
            --verde:       #3d7f50;
            --borde:       #c6e2c7;
            --sombra:      rgba(61,127,80,0.10);
            --texto:       #2a5c38;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--crema);
            color: var(--texto);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .panel-superior {
            max-width: 1200px;
            margin: 24px auto;
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: flex-start;
            padding: 0 16px;
        }

        .progreso {
            background-color: white;
            border: 1px solid var(--borde);
            padding: 20px 24px;
            border-radius: 14px;
            text-align: center;
            min-width: 260px;
            max-width: 380px;
            flex: 1 1 260px;
            box-shadow: 0 2px 12px var(--sombra);
        }

        .progreso p {
            margin: 0 0 10px;
            font-size: 0.9rem;
            color: var(--texto);
        }

        .barra-externa {
            width: 100%;
            background-color: #d8eedd;
            border-radius: 10px;
            overflow: hidden;
            height: 14px;
            margin: 8px 0 4px;
        }

        .barra-interna {
            height: 100%;
            background: linear-gradient(90deg, #3d7f50, #5c9c6f);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        #porcentaje { font-weight: 700; color: var(--verde); }

        .progreso button {
            margin-top: 12px;
            padding: 8px 18px;
            background-color: var(--verde);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: background 0.2s, transform 0.15s;
        }
        .progreso button:hover {
            background-color: var(--verde-oscuro);
            transform: translateY(-1px);
        }

        .selector-electivas {
            background-color: white;
            border: 1px solid var(--borde);
            padding: 20px 24px;
            border-radius: 14px;
            min-width: 260px;
            max-width: 520px;
            flex: 1 1 300px;
            box-shadow: 0 2px 12px var(--sombra);
        }

        .selector-electivas h3 {
            margin: 0 0 6px;
            font-size: 0.95rem;
            color: var(--verde);
            font-weight: 700;
        }

        .selector-electivas .subtitulo {
            font-size: 0.78rem;
            color: #3a6b47;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .areas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .area-card {
            border: 2px solid var(--borde);
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--crema);
            position: relative;
        }

        .area-card:hover { border-color: var(--verde); background: #ddf0e0; }

        .area-card.seleccionada {
            border-color: var(--verde);
            background: #ddf0e0;
            box-shadow: 0 0 0 1px var(--verde);
        }

        .area-card .badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 20px;
            margin-bottom: 4px;
            letter-spacing: 0.04em;
        }

        .area-card.seleccionada .badge { background: var(--verde); color: white; }
        .area-card:not(.seleccionada) .badge { display: none; }

        .area-card .nombre {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--texto);
            display: block;
        }

        .area-card .creditos-area {
            font-size: 0.72rem;
            color: #3a6b47;
        }

        .instruccion {
            font-size: 0.75rem;
            color: #3a6b47;
            margin-top: 10px;
            text-align: center;
            font-style: italic;
        }

        .resumen-creditos {
            margin-top: 14px;
            border-top: 1px solid var(--borde);
            padding-top: 12px;
        }

        .resumen-creditos h4 {
            font-size: 0.8rem;
            color: var(--verde);
            margin: 0 0 8px;
            font-weight: 600;
        }

        .fila-area {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 0.78rem;
        }

        .fila-area .label { flex: 1; color: var(--texto); }
        .fila-area .mini-barra-ext {
            flex: 2;
            height: 8px;
            background: #d8eedd;
            border-radius: 4px;
            overflow: hidden;
        }
        .fila-area .mini-barra-int {
            height: 100%;
            background: linear-gradient(90deg, #3d7f50, #5c9c6f);
            border-radius: 4px;
            transition: width 0.4s;
        }
        .fila-area .cred-txt { width: 55px; text-align: right; color: #3a6b47; font-weight: 600; }

        .malla-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 16px 20px 24px;
            box-sizing: border-box;
            scroll-snap-type: x mandatory;
        }

        .ciclo {
            min-width: 220px;
            max-width: 240px;
            flex-shrink: 0;
            background-color: white;
            border-radius: 14px;
            padding: 14px;
            border: 1px solid var(--borde);
            box-shadow: 0 2px 8px var(--sombra);
            scroll-snap-align: start;
        }

        .ciclo h2 {
            color: var(--verde);
            text-align: center;
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0 0 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--borde);
        }

        .ciclo-creditos {
            text-align: center;
            font-size: 0.72rem;
            color: #3a6b47;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .curso {
            position: relative;
            padding: 9px 10px;
            border-radius: 8px;
            border: 1px solid #b7d9b8;
            cursor: default;
            transition: all 0.25s ease;
            text-align: center;
            margin-bottom: 8px;
            font-size: 0.78rem;
            line-height: 1.35;
            background-color: #f6fbf7;
            opacity: 0.55;
        }

        .curso.activo {
            background-color: #d9ecdb;
            border-color: #3d7f50;
            color: var(--texto);
            font-weight: 500;
            cursor: pointer;
            opacity: 1;
        }
        .curso.activo:hover { background-color: #c8e4cb; transform: translateY(-1px); box-shadow: 0 3px 8px var(--sombra); }

        .curso.tildado {
            text-decoration: line-through;
            background-color: #e4f2e5;
            color: #778877;
            opacity: 1;
            cursor: pointer;
            border-color: var(--borde);
        }

        .curso.electiva-turisticos    { border-left: 3px solid #3d7f50; }
        .curso.electiva-hospedaje     { border-left: 3px solid #5c9c6f; }
        .curso.electiva-gastronomicos { border-left: 3px solid #92c3a0; }

        .curso.oculto { display: none; }

        .curso.bloqueado::after {
            content: '🔒';
            position: absolute;
            right: 7px;
            top: 7px;
            font-size: 0.65rem;
        }

        .tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background-color: white;
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.75rem;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
            display: none;
            white-space: pre-line;
            z-index: 100;
            text-align: left;
            min-width: 160px;
            pointer-events: none;
        }

        .curso:hover .tooltip { display: block; }

        .aviso {
            text-align: center;
            padding: 10px 20px;
            font-size: 0.82rem;
            font-weight: 600;
            border-radius: 8px;
            margin: 0 20px 12px;
            display: none;
        }
        .aviso.ok  { background: #d4edda; color: #155724; display: block; }
        .aviso.mal { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>

<div id="aviso-creditos" class="aviso"></div>

<div class="panel-superior">

    <!-- PROGRESO -->
    <div class="progreso">
        <p><strong>Créditos completados: <span id="creditos">0</span> / <span id="total-creditos">0</span></strong> <span style="color:#3a6b47;font-size:0.8rem;">(mín: 220)</span></p>
        <div class="barra-externa">
            <div class="barra-interna" id="barra-progreso"></div>
        </div>
        <p style="margin:4px 0 0;font-size:0.8rem;"><span id="porcentaje">0</span>% completado</p>
        <button id="reset">↺ Restablecer progreso</button>
    </div>

    <!-- SELECTOR DE ESPECIALIDADES -->
    <div class="selector-electivas">
        <h3>🎯 Elige tus 2 especialidades</h3>

        <div class="resumen-creditos">

            <div id="resumen-areas"></div>
        </div>
    </div>

</div>

<!-- MALLA -->
<div class="malla-container" id="contenedor-cursos"></div>

const AREAS_INFO = {
    turisticos:    { label: "🧳 Servicios Turísticos",    creditos: 15 }, // ← cambiado de 12 a 15
    hospedaje:     { label: "🏨 Servicios de Hospedaje",  creditos: 15 }, // ← cambiado de 12 a 15
    gastronomicos: { label: "🍛 Servicios Gastronómicos", creditos: 15 }, // ← cambiado de 12 a 15
};

const CREDITOS_MINIMOS = 220;
const carrera = 'turismo';
const prefix  = carrera + '_';

let estadoAreas = {};

function guardarEstadoAreas() {
    localStorage.setItem(prefix + 'estadoAreas', JSON.stringify(estadoAreas));
}

function cargarEstadoAreas() {
    const guardado = localStorage.getItem(prefix + 'estadoAreas');
    if (guardado) {
        estadoAreas = JSON.parse(guardado);
    } else {
        const viejas = JSON.parse(localStorage.getItem(prefix + 'electivasSeleccionadas') || '[]');
        estadoAreas = {};
        viejas.forEach((a, i) => { estadoAreas[a] = i === 0 ? 'principal' : 'secundaria'; });
    }
}

function areasSeleccionadas() {
    return Object.keys(estadoAreas).filter(a => estadoAreas[a]);
}

function renderAreasGrid() {
    const grid = document.getElementById('areas-grid');
    grid.innerHTML = '';
    Object.entries(AREAS_INFO).forEach(([key, info]) => {
        const activa = estadoAreas[key];
        const card = document.createElement('div');
        card.className = 'area-card' + (activa ? ' seleccionada' : '');
        card.dataset.area = key;

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = '✓ Seleccionada';

        const nombre = document.createElement('span');
        nombre.className = 'nombre';
        nombre.textContent = info.label;

        const cred = document.createElement('span');
        cred.className = 'creditos-area';
        cred.textContent = info.creditos + ' créditos disponibles';

        card.appendChild(badge);
        card.appendChild(nombre);
        card.appendChild(cred);
        card.addEventListener('click', () => toggleArea(key));
        grid.appendChild(card);
    });
}

function toggleArea(area) {
    if (estadoAreas[area]) {
        delete estadoAreas[area];
    } else {
        if (areasSeleccionadas().length >= 2) {
            alert('⚠️ Solo puedes elegir 2 especialidades. Deselecciona una primero.');
            return;
        }
        estadoAreas[area] = 'seleccionada';
    }
    guardarEstadoAreas();
    renderAreasGrid();
    renderResumenAreas();
    renderCursos();
    actualizarCreditos();
}

function renderResumenAreas() {
    const contenedor = document.getElementById('resumen-areas');
    const selec = areasSeleccionadas();
    if (selec.length === 0) {
        contenedor.innerHTML = '<p style="font-size:0.78rem;color:#3a6b47;margin:0;">Selecciona al menos un área para ver el resumen.</p>';
        return;
    }
    contenedor.innerHTML = '';
    selec.forEach(area => {
        const info = AREAS_INFO[area];
        const completados = cursos
            .filter(c => c.area === area && localStorage.getItem(prefix + c.nombre) === 'true')
            .reduce((s, c) => s + c.creditos, 0);
        const pct = Math.round((completados / info.creditos) * 100);
        const fila = document.createElement('div');
        fila.className = 'fila-area';
        fila.innerHTML = `
            <span class="label">${info.label.split(' ').slice(1).join(' ')}</span>
            <div class="mini-barra-ext"><div class="mini-barra-int" style="width:${pct}%"></div></div>
            <span class="cred-txt">${completados}/${info.creditos} cr</span>
        `;
        contenedor.appendChild(fila);
    });
}

function actualizarCreditos() {
    const selec = areasSeleccionadas();
    let suma = 0, total = 0;

    cursos.forEach(c => {
        if (c.area && !selec.includes(c.area)) return;
        total += c.creditos;
        if (localStorage.getItem(prefix + c.nombre) === 'true') suma += c.creditos;
    });

    document.getElementById('creditos').textContent = suma;
    document.getElementById('total-creditos').textContent = total;
    const pct = total > 0 ? Math.round((suma / total) * 100) : 0;
    document.getElementById('barra-progreso').style.width = pct + '%';
    document.getElementById('porcentaje').textContent = pct;

    const aviso = document.getElementById('aviso-creditos');
    if (selec.length === 0) {
        aviso.className = 'aviso';
    } else if (total >= CREDITOS_MINIMOS) {
        aviso.className = 'aviso ok';
        aviso.textContent = '✅ Con las áreas seleccionadas tienes ' + total + ' créditos disponibles — superas el mínimo de ' + CREDITOS_MINIMOS + '.';
    } else {
        aviso.className = 'aviso mal';
        aviso.textContent = '⚠️ Con las áreas seleccionadas solo tienes ' + total + ' créditos disponibles — necesitas al menos ' + CREDITOS_MINIMOS + '. Faltan ' + (CREDITOS_MINIMOS - total) + ' cr.';
    }

    renderResumenAreas();
}

function renderCursos() {
    const contenedor = document.getElementById('contenedor-cursos');
    contenedor.innerHTML = '';
    const selec = areasSeleccionadas();

    const agrupados = {};
    cursos.forEach(c => {
        if (!agrupados[c.ciclo]) agrupados[c.ciclo] = [];
        agrupados[c.ciclo].push(c);
    });

    Object.keys(agrupados).sort((a, b) => a - b).forEach(ciclo => {
        const divCiclo = document.createElement('div');
        divCiclo.className = 'ciclo';

        const titulo = document.createElement('h2');
        titulo.textContent = ciclo + '° Ciclo';
        divCiclo.appendChild(titulo);

        const creditosCiclo = agrupados[ciclo]
            .filter(c => !c.area || selec.includes(c.area))
            .reduce((s, c) => s + c.creditos, 0);
        const credDiv = document.createElement('div');
        credDiv.className = 'ciclo-creditos';
        credDiv.textContent = creditosCiclo + ' créditos';
        divCiclo.appendChild(credDiv);

        agrupados[ciclo].forEach(c => {
            const visible = !c.area || selec.includes(c.area);
            const estado = localStorage.getItem(prefix + c.nombre) === 'true';
            const prereqOk = !c.prereq || c.prereq.every(p => localStorage.getItem(prefix + p) === 'true');

            const div = document.createElement('div');
            div.className = 'curso';
            if (!visible)      div.classList.add('oculto');
            else if (estado)   div.classList.add('tildado');
            else if (prereqOk) div.classList.add('activo');
            else               div.classList.add('bloqueado');

            if (c.area) div.classList.add('electiva-' + c.area);

            div.textContent = c.nombre;

            const tooltip = document.createElement('div');
            tooltip.className = 'tooltip';
            tooltip.textContent = 'Créditos: ' + c.creditos + '\nPrerrequisitos: ' + (c.prereq ? c.prereq.join(', ') : 'Ninguno') + (c.area ? '\nÁrea: ' + AREAS_INFO[c.area].label : '');
            div.appendChild(tooltip);

            if (div.classList.contains('activo') || div.classList.contains('tildado')) {
                div.addEventListener('click', () => {
                    const yaCompletado = localStorage.getItem(prefix + c.nombre) === 'true';

                    if (!yaCompletado) {
                        const creditosCiclo = cursos
                            .filter(x => x.ciclo === c.ciclo && localStorage.getItem(prefix + x.nombre) === 'true')
                            .reduce((s, x) => s + x.creditos, 0);
                        if (creditosCiclo + c.creditos > 26) {
                            alert('⚠️ Límite de 26 créditos por ciclo.\nYa tienes ' + creditosCiclo + ' cr en el ' + c.ciclo + '° ciclo y este curso tiene ' + c.creditos + ' cr (total: ' + (creditosCiclo + c.creditos) + ' cr).');
                            return;
                        }
                    }

                    localStorage.setItem(prefix + c.nombre, !yaCompletado);
                    renderCursos();
                    actualizarCreditos();
                });
            }

            divCiclo.appendChild(div);
        });

        contenedor.appendChild(divCiclo);
    });
}

function inicializarEventListeners() {
    document.getElementById('reset').addEventListener('click', () => {
        if (!confirm('¿Seguro que quieres restablecer todo el progreso?')) return;
        for (let i = localStorage.length - 1; i >= 0; i--) {
            const key = localStorage.key(i);
            if (key && key.startsWith(prefix)) localStorage.removeItem(key);
        }
        estadoAreas = {};
        renderAreasGrid();
        renderCursos();
        actualizarCreditos();
    });
}

function inicializar() {
    cargarEstadoAreas();
    renderAreasGrid();
    renderCursos();
    actualizarCreditos();
    inicializarEventListeners();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', inicializar);
} else {
    inicializar();
}
</script>
</body>
